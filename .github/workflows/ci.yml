name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK 34
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Test and build debug APK
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: icar-debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  jetson-server:
    name: Jetson Server Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Run Jetson server tests
        env:
          PYTHONPATH: jetson_server:.
        run: python -m unittest discover -s jetson_server -p "test_*.py"

  jarvis:
    name: Jarvis Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      NO_PROXY: "*"
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
      no_proxy: "*"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: jarvis_agent/pyproject.toml

      - name: Install Jarvis test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./jarvis_agent[test]"

      - name: Run Jarvis tests
        run: python -m pytest jarvis_agent/tests
